services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    ports:
      - '4000:4000'
      - '5555:5555'
    volumes:
      - ./server:/app
      - /app/node_modules
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:4000/health || exit 1']
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - restaurant-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    env_file:
      - ./client/.env
    ports:
      - '3000:3000'
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev -- --hostname 0.0.0.0
    depends_on:
      server:
        condition: service_healthy
    networks:
      - restaurant-network

networks:
  restaurant-network:
    driver: bridge

volumes:
  postgres_data:
