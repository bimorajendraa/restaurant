services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./client/.env
    networks:
      - restaurant-network
    depends_on:
      server:
        condition: service_healthy

  server:
    build: ./server
    environment:
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: "file:/app/prisma/dev.db"
      INITIAL_EMAIL_OWNER: "owner@example.com"
      INITIAL_PASSWORD_OWNER: "secret123"
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./server/prisma:/app/prisma # giữ schema.prisma + dev.db khi rebuild
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/health || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 20
    networks:
      - restaurant-network

volumes:
  prisma_data:
    driver: local
networks:
  restaurant-network:
    driver: bridge
